server {
    listen 80;
    server_name localhost;
    root /var/www/mission-control;
    index index.html;

    # SPA fallback for Next.js dynamic routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to Mission Control (preserve /api/ prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Bifrost (strip /bifrost/ prefix)
    location /bifrost/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
    }

    # WebSocket for terminal (preserve /ws/ prefix)
    location /ws/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SSE streaming
    location /api/tasks/stream {
        proxy_pass http://127.0.0.1:3004/api/tasks/stream;
        proxy_http_version 1.1;
        proxy_cache off;
        proxy_buffering off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
}
