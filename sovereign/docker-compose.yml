networks:
  sovereign-net:
    driver: bridge
volumes:
  pg_data:
  redis_data:
  chroma_data:
  grafana_data:
  prometheus_data:
services:
  postgres:
    image: postgres:16-alpine
    container_name: sovereign-postgres-1
    restart: unless-stopped
    networks: [sovereign-net]
    environment:
      POSTGRES_DB: sovereign
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis/redis-stack:latest
    container_name: sovereign-redis-1
    restart: unless-stopped
    networks: [sovereign-net]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
      - "127.0.0.1:8001:8001"
    command: >
      redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  chroma:
    image: chromadb/chroma:latest
    container_name: sovereign-chroma-1
    restart: unless-stopped
    networks: [sovereign-net]
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8200:8000"
    environment:
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "true"
  prometheus:
    image: prom/prometheus:latest
    container_name: sovereign-prometheus-1
    restart: unless-stopped
    networks: [sovereign-net]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
  grafana:
    image: grafana/grafana:latest
    container_name: sovereign-grafana-1
    restart: unless-stopped
    networks: [sovereign-net]
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
