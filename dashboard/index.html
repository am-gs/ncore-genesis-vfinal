<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCore Genesis v6.0 — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}

/* ── Palette ── */
:root{
  --bg:#0a0e17;
  --bg-panel:#0f1420;
  --bg-surface:#141a2a;
  --bg-surface-2:#1a2035;
  --bg-hover:#1e2640;
  --border:#1e293b;
  --border-active:#334155;
  --text:#e2e8f0;
  --text-muted:#94a3b8;
  --text-faint:#475569;
  --cyan:#22d3ee;
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --purple:#a78bfa;
  --blue:#3b82f6;
  --tree-line:#334155;
  --glow-cyan:0 0 20px rgba(34,211,238,0.15);
  --glow-green:0 0 12px rgba(34,197,94,0.2);
  --glow-red:0 0 12px rgba(239,68,68,0.2);
  --radius:6px;
  --font-mono:'JetBrains Mono',ui-monospace,'Cascadia Code','Fira Code',monospace;
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --transition:200ms ease-out;
}

body{
  min-height:100dvh;
  font-family:var(--font-sans);
  font-size:13px;
  color:var(--text);
  background:var(--bg);
  overflow:hidden;
  line-height:1.5;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-active)}

/* ── Top Bar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:48px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:linear-gradient(180deg,rgba(15,20,32,0.98),rgba(10,14,23,0.95));
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-brand{
  font-family:var(--font-mono);font-size:14px;font-weight:600;
  color:var(--cyan);
  text-shadow:0 0 10px rgba(34,211,238,0.3),0 0 40px rgba(34,211,238,0.1);
  letter-spacing:-0.02em;
}
.topbar-brand span{color:var(--text-faint);font-weight:400;font-size:11px;margin-left:4px}
.topbar-center{display:flex;align-items:center;gap:16px}
.status-item{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--font-mono);color:var(--text-muted)}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--text-faint);
  transition:background var(--transition),box-shadow var(--transition);
}
.status-dot.ok{background:var(--green);box-shadow:var(--glow-green)}
.status-dot.err{background:var(--red);box-shadow:var(--glow-red)}
.status-dot.warn{background:var(--amber)}
.topbar-right{display:flex;align-items:center;gap:16px;font-family:var(--font-mono);font-size:11px}
.stat-pill{display:flex;align-items:center;gap:4px;color:var(--text-muted)}
.stat-pill .val{color:var(--text);font-weight:500}
.ws-indicator{display:flex;align-items:center;gap:5px}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint);transition:all var(--transition)}
.ws-dot.connected{background:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,0.4);animation:pulse-ws 2s ease-in-out infinite}
.ws-dot.reconnecting{background:var(--amber);animation:pulse-ws 1s ease-in-out infinite}
@keyframes pulse-ws{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── Layout ── */
.main{display:flex;height:calc(100dvh - 48px);margin-top:48px}
.panel-left{
  width:35%;min-width:300px;max-width:500px;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  background:var(--bg-panel);
}
.panel-right{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);
  overflow:hidden;
}

/* ── Chat Panel ── */
.chat-header{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:12px;
  color:var(--text-muted);
  display:flex;align-items:center;justify-content:space-between;
}
.chat-header-actions{display:flex;gap:8px}
.icon-btn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius);color:var(--text-muted);cursor:pointer;
  border:none;background:none;
  transition:all var(--transition);
}
.icon-btn:hover{background:var(--bg-hover);color:var(--text)}
.icon-btn.active{color:var(--cyan)}
.chat-messages{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px;
  display:flex;flex-direction:column;gap:8px;
}
.msg{
  max-width:92%;padding:10px 14px;
  border-radius:10px;
  font-size:13px;line-height:1.55;
  animation:msg-in 250ms ease-out;
  word-wrap:break-word;
  overflow-wrap:break-word;
}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{
  align-self:flex-end;
  background:var(--bg-surface-2);
  border:1px solid var(--border);
  border-bottom-right-radius:3px;
}
.msg.system{
  align-self:flex-start;
  background:var(--bg-surface);
  border:1px solid rgba(30,41,59,0.5);
  border-bottom-left-radius:3px;
}
.msg.system .md-content h1,.msg.system .md-content h2,.msg.system .md-content h3{
  font-family:var(--font-mono);color:var(--cyan);margin:12px 0 6px;font-size:13px;font-weight:600;
}
.msg.system .md-content h1:first-child,.msg.system .md-content h2:first-child,.msg.system .md-content h3:first-child{margin-top:0}
.msg.system .md-content p{margin:4px 0}
.msg.system .md-content ul,.msg.system .md-content ol{padding-left:18px;margin:4px 0}
.msg.system .md-content li{margin:2px 0}
.msg.system .md-content code{
  font-family:var(--font-mono);font-size:12px;
  background:rgba(34,211,238,0.08);color:var(--cyan);
  padding:1px 5px;border-radius:3px;
}
.msg.system .md-content pre{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;margin:8px 0;overflow-x:auto;
}
.msg.system .md-content pre code{background:none;padding:0;color:var(--text)}
.msg.system .md-content a{color:var(--cyan);text-decoration:underline}
.msg.system .md-content strong{color:var(--text);font-weight:600}
.msg.system .md-content blockquote{border-left:3px solid var(--cyan);padding-left:10px;color:var(--text-muted);margin:8px 0}
.msg-meta{
  display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;
}
.meta-pill{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:9999px;
  font-family:var(--font-mono);font-size:10px;
  background:rgba(34,211,238,0.06);
  border:1px solid rgba(34,211,238,0.12);
  color:var(--cyan);
}
.meta-pill.green{background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.12);color:var(--green)}
.meta-pill.amber{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.12);color:var(--amber)}
.meta-pill.purple{background:rgba(167,139,250,0.06);border-color:rgba(167,139,250,0.12);color:var(--purple)}

/* ── Chat Input ── */
.chat-input-area{
  padding:10px 12px;
  border-top:1px solid var(--border);
  background:var(--bg-panel);
}
.input-row{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 8px 6px 12px;
  transition:border-color var(--transition);
}
.input-row:focus-within{border-color:var(--cyan)}
.input-row textarea{
  flex:1;resize:none;
  border:none;outline:none;
  background:none;color:var(--text);
  font-family:var(--font-sans);font-size:13px;
  line-height:1.5;
  max-height:120px;min-height:20px;
  padding:4px 0;
}
.input-row textarea::placeholder{color:var(--text-faint)}
.input-btn{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border:none;border-radius:8px;
  cursor:pointer;color:var(--text-muted);
  background:none;
  transition:all var(--transition);
  flex-shrink:0;
}
.input-btn:hover{color:var(--text);background:var(--bg-hover)}
.input-btn.send{color:var(--bg);background:var(--cyan);border-radius:8px}
.input-btn.send:hover{background:#06b6d4}
.input-btn.send:disabled{opacity:0.4;cursor:default}
.file-label{display:flex;align-items:center;justify-content:center;width:32px;height:32px;cursor:pointer;color:var(--text-muted);border-radius:8px;transition:all var(--transition)}
.file-label:hover{color:var(--text);background:var(--bg-hover)}
.file-info{font-size:11px;color:var(--amber);padding:4px 0 0 4px;font-family:var(--font-mono)}

/* ── Trace Panel ── */
.trace-header{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:12px;
  color:var(--text-muted);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-panel);
}
.trace-actions{display:flex;gap:6px;align-items:center}
.trace-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px;
  scroll-behavior:smooth;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 23px,rgba(34,211,238,0.015) 23px,rgba(34,211,238,0.015) 24px);
}

/* ── Task Block ── */
.task-block{
  margin-bottom:20px;
  animation:task-in 300ms ease-out;
}
@keyframes task-in{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.task-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.task-header .task-icon{font-size:14px}
.task-header .task-title{
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  color:var(--text);
  flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-header .task-id{
  font-family:var(--font-mono);font-size:10px;
  color:var(--text-faint);
  flex-shrink:0;
}

/* ── Tree ── */
.tree{position:relative;padding-left:0}
.tree-section{position:relative;margin-bottom:2px}
.tree-section:last-child .tree-vline{display:none}

.tree-node{
  position:relative;
  padding:6px 0 6px 24px;
  animation:node-in 250ms ease-out;
}
@keyframes node-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* Vertical + horizontal branch lines */
.tree-node::before{
  content:'';position:absolute;left:7px;top:0;bottom:0;
  width:1px;background:var(--tree-line);
}
.tree-node:last-child::before{bottom:50%}
.tree-node::after{
  content:'';position:absolute;left:7px;top:50%;
  width:14px;height:1px;background:var(--tree-line);
}
.tree-node.active::before,.tree-node.active::after{background:var(--cyan);box-shadow:0 0 6px rgba(34,211,238,0.4)}
.tree-node.active .node-header{background:rgba(34,211,238,0.04)}
.tree-node.done::before,.tree-node.done::after{background:var(--green)}
.tree-node.error::before,.tree-node.error::after{background:var(--red)}

.node-header{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:12px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:var(--radius);
  transition:background var(--transition);
}
.node-header:hover{background:var(--bg-hover)}
.node-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.node-label{font-weight:500;color:var(--text)}
.node-detail{color:var(--text-faint);font-size:11px;font-weight:400}
.node-timer{
  margin-left:auto;font-size:11px;font-weight:600;
  font-variant-numeric:tabular-nums;
  color:var(--cyan);
  flex-shrink:0;
}
.node-timer.done{color:var(--green)}
.node-timer.error{color:var(--red)}

.node-tags{display:flex;gap:4px;flex-shrink:0;margin-left:4px}
.node-tag{
  padding:1px 6px;border-radius:9999px;
  font-size:9px;font-weight:500;letter-spacing:0.02em;
  text-transform:uppercase;
}
.node-tag.tool{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.15)}
.node-tag.cloud{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.15)}
.node-tag.uncensored{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.15)}
.node-tag.local{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.15)}

/* Progress bar */
.progress-bar{
  height:3px;border-radius:2px;
  background:var(--border);
  margin:4px 8px 2px 8px;
  overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:2px;
  background:var(--cyan);
  transition:width 300ms ease-out;
  position:relative;
}
.progress-fill.pulsing::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.progress-fill.done{background:var(--green)}
.progress-fill.error{background:var(--red)}

/* Sub-results */
.sub-results{
  padding:4px 0 2px 28px;
  font-family:var(--font-mono);font-size:11px;
}
.sub-results.collapsed{display:none}
.sub-result{
  padding:2px 8px;
  color:var(--text-muted);
  position:relative;
  animation:sub-in 200ms ease-out;
  line-height:1.6;
}
@keyframes sub-in{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.sub-result::before{
  content:'';position:absolute;left:-17px;top:0;bottom:0;
  width:1px;background:var(--tree-line);
}
.sub-result:last-child::before{bottom:50%}
.sub-result::after{
  content:'';position:absolute;left:-17px;top:50%;
  width:10px;height:1px;background:var(--tree-line);
}
.sub-result .sr-icon{margin-right:4px}
.sr-ok{color:var(--green)}
.sr-wait{color:var(--amber)}
.sr-err{color:var(--red)}
.sr-info{color:var(--blue)}

/* ── Planner section ── */
.plan-section{
  padding:6px 0 6px 24px;
  position:relative;
  animation:node-in 250ms ease-out;
}
.plan-section::before{
  content:'';position:absolute;left:7px;top:0;bottom:0;
  width:1px;background:var(--tree-line);
}
.plan-label{
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;
}
.plan-label .plan-icon{font-size:14px}
.plan-label .plan-model{color:var(--text-faint);font-size:11px;font-weight:400}
.plan-label .plan-time{color:var(--amber);font-size:11px;margin-left:auto}
.plan-agents{padding:4px 0 0 28px}
.plan-agent{
  font-family:var(--font-mono);font-size:11px;color:var(--text-muted);
  padding:1px 0;
  position:relative;
}
.plan-agent::before{
  content:'├';color:var(--tree-line);margin-right:6px;
}
.plan-agent:last-child::before{content:'└'}

/* ── Complete Footer ── */
.task-complete{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;margin-top:4px;
  font-family:var(--font-mono);font-size:11px;
  background:rgba(34,197,94,0.04);
  border:1px solid rgba(34,197,94,0.1);
  border-radius:var(--radius);
  color:var(--green);
  animation:node-in 300ms ease-out;
}
.task-complete .tc-stat{color:var(--text-muted);margin-left:8px}
.task-complete .tc-val{color:var(--text);font-weight:500}

/* ── Empty State ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-faint);
  font-family:var(--font-mono);font-size:12px;
  gap:8px;
  text-align:center;
  padding:20px;
}
.empty-state .empty-icon{font-size:32px;opacity:0.3}
.empty-state .empty-text{max-width:260px;line-height:1.6}

/* ── Mobile ── */
@media(max-width:768px){
  .main{flex-direction:column}
  .panel-left{width:100%;max-width:none;min-width:0;height:50%;border-right:none;border-bottom:1px solid var(--border)}
  .panel-right{height:50%}
  .topbar-center{display:none}
}

/* ── Utility ── */
.hidden{display:none!important}
.auto-scroll-active .trace-scroll{scroll-behavior:smooth}
</style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">NCore Genesis<span>v6.0</span></div>
  </div>
  <div class="topbar-center">
    <div class="status-item"><div class="status-dot" id="dot-gateway"></div>Gateway</div>
    <div class="status-item"><div class="status-dot" id="dot-llama"></div>llama-server</div>
    <div class="status-item"><div class="status-dot" id="dot-redis"></div>Redis</div>
    <div class="status-item"><div class="status-dot" id="dot-openrouter"></div>OpenRouter</div>
  </div>
  <div class="topbar-right">
    <div class="stat-pill">$ <span class="val" id="session-cost">0.0000</span></div>
    <div class="stat-pill">tok <span class="val" id="session-tokens">0</span></div>
    <div class="ws-indicator"><div class="ws-dot" id="ws-dot"></div><span id="ws-label">WS</span></div>
  </div>
</header>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- ── LEFT: Chat ── -->
  <div class="panel-left">
    <div class="chat-header">
      <span>Chat</span>
      <div class="chat-header-actions">
        <button class="icon-btn" id="btn-sound" title="Toggle sound">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        </button>
        <button class="icon-btn" id="btn-export" title="Export transcript">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="empty-state" id="chat-empty">
        <div class="empty-icon">⌘</div>
        <div class="empty-text">Send a message to begin. The execution trace will appear on the right.</div>
      </div>
    </div>
    <div class="chat-input-area">
      <div id="file-info" class="file-info hidden"></div>
      <div class="input-row">
        <label class="file-label" title="Attach file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          <input type="file" id="file-input" class="hidden" accept="image/*,audio/*,video/*,.pdf,.txt,.csv,.json">
        </label>
        <textarea id="chat-input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
        <button class="input-btn send" id="btn-send" disabled title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Trace ── -->
  <div class="panel-right">
    <div class="trace-header">
      <span>Live Execution Trace</span>
      <div class="trace-actions">
        <button class="icon-btn active" id="btn-autoscroll" title="Auto-scroll">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="icon-btn" id="btn-clear-trace" title="Clear trace">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>
    <div class="trace-scroll" id="trace-scroll">
      <div id="trace-container">
        <div class="empty-state" id="trace-empty">
          <div class="empty-icon">⚡</div>
          <div class="empty-text">Execution trace streams here in real-time as tasks are processed.</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   NCore Genesis v6.0 — Dashboard Controller
   ═══════════════════════════════════════════════ */

(function(){
'use strict';

// ── Config ──
const API_BASE = location.origin;
const WS_URL = `ws://${location.hostname}:8080/ws`;
const READY_INTERVAL = 15000;

// ── State ──
let sessionCost = 0, sessionTokens = 0;
let soundEnabled = false;
let autoScroll = true;
let ws = null;
let wsRetries = 0;
const MAX_WS_RETRIES = 50;
const tasks = new Map();       // task_id -> task state
const agentTimers = new Map(); // task_id:role -> interval
let pendingFile = null;
const chatHistory = [];        // {role, content, meta?}
const traceHistory = [];       // raw events

// ── DOM ──
const $chatMessages = document.getElementById('chat-messages');
const $chatInput = document.getElementById('chat-input');
const $btnSend = document.getElementById('btn-send');
const $fileInput = document.getElementById('file-input');
const $fileInfo = document.getElementById('file-info');
const $traceContainer = document.getElementById('trace-container');
const $traceScroll = document.getElementById('trace-scroll');
const $chatEmpty = document.getElementById('chat-empty');
const $traceEmpty = document.getElementById('trace-empty');
const $sessionCost = document.getElementById('session-cost');
const $sessionTokens = document.getElementById('session-tokens');
const $wsDot = document.getElementById('ws-dot');
const $wsLabel = document.getElementById('ws-label');

// ── Marked config ──
marked.setOptions({breaks:true, gfm:true});

// ══════════════════════════════════════════
// STATUS POLLING
// ══════════════════════════════════════════
async function pollStatus(){
  try{
    const r = await fetch(API_BASE + '/ready');
    const d = await r.json();
    setDot('dot-gateway', d.checks?.gateway?.status === 'ok');
    setDot('dot-llama', d.checks?.llama_server?.status === 'ok');
    setDot('dot-redis', d.checks?.redis_blackboard?.status === 'ok');
    setDot('dot-openrouter', d.checks?.openrouter?.status === 'ok');
  } catch(e){
    ['dot-gateway','dot-llama','dot-redis','dot-openrouter'].forEach(id=>setDot(id, false));
  }
}
function setDot(id, ok){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.toggle('ok', ok);
  el.classList.toggle('err', !ok);
}
pollStatus();
setInterval(pollStatus, READY_INTERVAL);

// ══════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════
function connectWS(){
  if(ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    wsRetries = 0;
    $wsDot.className = 'ws-dot connected';
    $wsLabel.textContent = 'WS';
  };
  ws.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      handleWSEvent(msg);
    } catch(err){}
  };
  ws.onclose = () => {
    $wsDot.className = 'ws-dot';
    $wsLabel.textContent = 'WS';
    scheduleReconnect();
  };
  ws.onerror = () => {
    $wsDot.className = 'ws-dot';
  };
}
function scheduleReconnect(){
  if(wsRetries >= MAX_WS_RETRIES) return;
  wsRetries++;
  $wsDot.className = 'ws-dot reconnecting';
  $wsLabel.textContent = 'reconnecting';
  const delay = Math.min(1000 * Math.pow(1.5, wsRetries), 30000);
  setTimeout(connectWS, delay);
}
connectWS();

// ══════════════════════════════════════════
// WS EVENT HANDLER
// ══════════════════════════════════════════
function handleWSEvent(msg){
  traceHistory.push(msg);
  const type = msg.type;
  const data = msg.data || msg;

  switch(type){
    case 'route':
      onRoute(data);
      break;
    case 'plan':
      onPlan(data);
      break;
    case 'agent_status':
      onAgentStatus(data);
      break;
    case 'tool_result':
    case 'sub_result':
      onSubResult(data);
      break;
    case 'result':
      onResult(data);
      break;
    case 'stream':
      onStream(data);
      break;
    case 'error':
      onError(data);
      break;
    default:
      onGenericEvent(msg);
  }
  if(autoScroll) scrollTrace();
}

function getOrCreateTask(taskId){
  if(tasks.has(taskId)) return tasks.get(taskId);
  const task = {
    id: taskId,
    el: null,
    agents: new Map(),
    status: 'running',
    startTime: Date.now(),
  };
  tasks.set(taskId, task);

  // Create DOM
  hideTraceEmpty();
  const block = document.createElement('div');
  block.className = 'task-block';
  block.id = 'task-' + taskId;
  block.innerHTML = `
    <div class="task-header">
      <span class="task-icon">▸</span>
      <span class="task-title" id="task-title-${taskId}">Task ${taskId.slice(0,8)}</span>
      <span class="task-id">${taskId.slice(0,8)}</span>
    </div>
    <div class="tree" id="tree-${taskId}"></div>
  `;
  $traceContainer.appendChild(block);
  task.el = block;
  task.tree = block.querySelector('.tree');
  return task;
}

function onRoute(data){
  const taskId = data.task_id || generateId();
  const task = getOrCreateTask(taskId);
  const title = task.el.querySelector('.task-title');
  if(data.prompt) title.textContent = truncate(data.prompt, 80);
  // Add route node
  const node = createNode('🔀', 'ROUTER', `→ ${data.tier || ''} / ${data.model || ''}`, 'done');
  task.tree.appendChild(node);
}

function onPlan(data){
  const taskId = data.task_id || [...tasks.keys()].pop() || generateId();
  const task = getOrCreateTask(taskId);
  if(data.prompt){
    const title = task.el.querySelector('.task-title');
    title.textContent = truncate(data.prompt, 80);
  }

  const section = document.createElement('div');
  section.className = 'plan-section';
  section.innerHTML = `
    <div class="plan-label">
      <span class="plan-icon">🧠</span>
      <span style="color:var(--text)">PLANNER</span>
      <span class="plan-model">${data.model || ''}</span>
      <span class="plan-time">${data.plan_time ? data.plan_time.toFixed(1)+'s' : ''}</span>
    </div>
    <div class="plan-agents" id="plan-agents-${taskId}"></div>
  `;
  task.tree.appendChild(section);

  const agentList = section.querySelector('.plan-agents');
  (data.agents || []).forEach(a => {
    const agDiv = document.createElement('div');
    agDiv.className = 'plan-agent';
    let tags = '';
    if(a.tool) tags += ` <span class="node-tag tool">${a.tool}</span>`;
    if(a.uncensored) tags += ' <span class="node-tag uncensored">uncensored</span>';
    if(a.provider === 'cloud' || (!a.tool && !a.uncensored)) tags += ' <span class="node-tag cloud">cloud</span>';
    agDiv.innerHTML = `${a.role || a.name || 'Agent'}${tags}`;
    agentList.appendChild(agDiv);
  });

  // Pre-register agents
  (data.agents || []).forEach((a, i) => {
    const role = a.role || a.name || `Agent ${i}`;
    task.agents.set(role, {status:'queued', index:i, startTime:null, el:null});
  });
}

function onAgentStatus(data){
  const taskId = data.task_id || [...tasks.keys()].pop();
  if(!taskId) return;
  const task = getOrCreateTask(taskId);
  const role = data.role || data.name || `Agent ${data.index||0}`;
  let agent = task.agents.get(role);

  if(data.status === 'running'){
    if(!agent) agent = {status:'queued', index:data.index||0, startTime:null, el:null};
    agent.status = 'running';
    agent.startTime = Date.now();
    task.agents.set(role, agent);

    // Create agent node
    const node = createAgentNode(taskId, role, data);
    task.tree.appendChild(node);
    agent.el = node;

    // Start timer
    startAgentTimer(taskId, role);
  }
  else if(data.status === 'done' || data.status === 'ok'){
    if(agent && agent.el){
      agent.status = 'done';
      const treeNode = agent.el.querySelector('.tree-node');
      if(treeNode){treeNode.classList.remove('active');treeNode.classList.add('done');}
      const timer = agent.el.querySelector('.node-timer');
      if(timer){
        timer.classList.add('done');
        timer.textContent = (data.latency || ((Date.now()-agent.startTime)/1000)).toFixed(1)+'s ✓';
      }
      const bar = agent.el.querySelector('.progress-fill');
      if(bar){bar.style.width='100%';bar.classList.remove('pulsing');bar.classList.add('done');}
      const icon = agent.el.querySelector('.node-icon');
      if(icon) icon.textContent = '✅';
      stopAgentTimer(taskId, role);

      // Add token/model info as sub-result
      if(data.tokens_out || data.model){
        const info = [];
        if(data.model) info.push(data.model);
        if(data.tokens_in) info.push(`${data.tokens_in}→${data.tokens_out||0} tok`);
        addSubResult(taskId, role, 'ok', info.join(' · '));
      }
    }
  }
  else if(data.status === 'error' || data.status === 'fail'){
    if(agent && agent.el){
      agent.status = 'error';
      const treeNode = agent.el.querySelector('.tree-node');
      if(treeNode){treeNode.classList.remove('active');treeNode.classList.add('error');}
      const timer = agent.el.querySelector('.node-timer');
      if(timer){timer.classList.add('error');timer.textContent = '✗';}
      const bar = agent.el.querySelector('.progress-fill');
      if(bar){bar.classList.remove('pulsing');bar.classList.add('error');bar.style.width='100%';}
      const icon = agent.el.querySelector('.node-icon');
      if(icon) icon.textContent = '❌';
      stopAgentTimer(taskId, role);
      if(data.error) addSubResult(taskId, role, 'err', data.error);
    }
  }
}

function onSubResult(data){
  const taskId = data.task_id || [...tasks.keys()].pop();
  if(!taskId) return;
  const role = data.role || data.agent || '';
  const status = data.status === 'error' ? 'err' : data.status === 'waiting' ? 'wait' : 'ok';
  const text = data.text || data.result || data.message || JSON.stringify(data);
  addSubResult(taskId, role, status, text);

  // Update progress if provided
  if(data.progress != null){
    const task = tasks.get(taskId);
    const agent = task?.agents.get(role);
    if(agent?.el){
      const bar = agent.el.querySelector('.progress-fill');
      if(bar) bar.style.width = data.progress + '%';
    }
  }
}

function onResult(data){
  const taskId = data.task_id || [...tasks.keys()].pop();
  if(!taskId) return;
  const task = tasks.get(taskId);
  if(!task) return;

  task.status = 'done';
  // Stop all timers
  task.agents.forEach((a, role) => {
    if(a.status === 'running') stopAgentTimer(taskId, role);
  });

  // Update session totals
  if(data.cost_usd) sessionCost += data.cost_usd;
  if(data.tokens?.total) sessionTokens += data.tokens.total;
  $sessionCost.textContent = sessionCost.toFixed(4);
  $sessionTokens.textContent = sessionTokens.toLocaleString();

  // Add complete footer
  const footer = document.createElement('div');
  footer.className = 'task-complete';
  footer.innerHTML = `
    ✅ <strong>COMPLETE</strong>
    <span class="tc-stat">time</span><span class="tc-val">${(data.latency_s||data.total_time||0).toFixed(1)}s</span>
    <span class="tc-stat">tokens</span><span class="tc-val">${(data.tokens?.total||0).toLocaleString()}</span>
    <span class="tc-stat">cost</span><span class="tc-val">$${(data.cost_usd||0).toFixed(4)}</span>
    <span class="tc-stat">agents</span><span class="tc-val">${data.agents||task.agents.size}</span>
  `;
  task.tree.appendChild(footer);

  // Update task icon
  const icon = task.el.querySelector('.task-icon');
  if(icon) icon.textContent = '✅';

  // Sound notification
  if(soundEnabled) playBeep();

  // Process specialist_results
  if(data.specialist_results){
    data.specialist_results.forEach(sr => {
      const role = sr.role;
      const agent = task.agents.get(role);
      if(agent && agent.el && agent.status !== 'done'){
        onAgentStatus({task_id: taskId, role, status:'done', latency:sr.latency, tokens_in:sr.tokens_in, tokens_out:sr.tokens_out, model:sr.model});
      }
    });
  }
}

function onStream(data){
  // Handle streaming text chunks — append to the current task output
}

function onError(data){
  const taskId = data.task_id || [...tasks.keys()].pop();
  if(!taskId) return;
  const task = getOrCreateTask(taskId);
  const errNode = createNode('❌', 'ERROR', data.message || data.error || 'Unknown error', 'error');
  task.tree.appendChild(errNode);
}

function onGenericEvent(msg){
  // Log unknown events to trace
  const taskId = msg.data?.task_id || [...tasks.keys()].pop();
  if(!taskId) return;
  const task = getOrCreateTask(taskId);
  const label = msg.type || 'event';
  const detail = typeof msg.data === 'string' ? msg.data : JSON.stringify(msg.data).slice(0,120);
  const node = createNode('📡', label.toUpperCase(), detail, 'done');
  task.tree.appendChild(node);
}

// ══════════════════════════════════════════
// DOM BUILDERS
// ══════════════════════════════════════════
function createNode(icon, label, detail, status){
  const div = document.createElement('div');
  div.className = `tree-node ${status||''}`;
  div.innerHTML = `
    <div class="node-header">
      <span class="node-icon">${icon}</span>
      <span class="node-label">${esc(label)}</span>
      <span class="node-detail">${esc(detail||'')}</span>
    </div>
  `;
  return div;
}

function createAgentNode(taskId, role, data){
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-section';
  wrapper.id = `agent-${taskId}-${slugify(role)}`;

  const node = document.createElement('div');
  node.className = 'tree-node active';

  let tags = '';
  if(data.tool) tags += `<span class="node-tag tool">${data.tool}</span>`;
  if(data.uncensored) tags += '<span class="node-tag uncensored">uncensored</span>';
  if(data.provider === 'cloud') tags += '<span class="node-tag cloud">cloud</span>';
  if(data.provider === 'local' || data.model?.includes('dolphin') || data.model?.includes('llama')) tags += '<span class="node-tag local">local</span>';

  node.innerHTML = `
    <div class="node-header" onclick="this.parentElement.parentElement.querySelector('.sub-results')?.classList.toggle('collapsed')">
      <span class="node-icon">⚡</span>
      <span class="node-label">${esc(role)}</span>
      <div class="node-tags">${tags}</div>
      <span class="node-timer" id="timer-${taskId}-${slugify(role)}">0.0s</span>
    </div>
    <div class="progress-bar"><div class="progress-fill pulsing" style="width:15%"></div></div>
  `;

  const subResults = document.createElement('div');
  subResults.className = 'sub-results';
  subResults.id = `subs-${taskId}-${slugify(role)}`;

  wrapper.appendChild(node);
  wrapper.appendChild(subResults);
  return wrapper;
}

function addSubResult(taskId, role, status, text){
  const task = tasks.get(taskId);
  if(!task) return;

  // Find sub-results container
  let container;
  if(role){
    container = document.getElementById(`subs-${taskId}-${slugify(role)}`);
  }
  if(!container){
    // Fallback — add to tree
    container = task.tree;
  }

  const iconMap = {ok:'✅', err:'❌', wait:'⏳', info:'ℹ️'};
  const classMap = {ok:'sr-ok', err:'sr-err', wait:'sr-wait', info:'sr-info'};

  const div = document.createElement('div');
  div.className = 'sub-result';
  div.innerHTML = `<span class="sr-icon ${classMap[status]||''}">${iconMap[status]||'•'}</span>${esc(text)}`;
  container.appendChild(div);

  // Auto-update progress bar heuristic
  if(status === 'ok' && role){
    const agent = task.agents.get(role);
    if(agent?.el){
      const subs = container.querySelectorAll('.sub-result').length;
      const bar = agent.el.querySelector('.progress-fill');
      if(bar){
        const pct = Math.min(15 + subs * 18, 95);
        bar.style.width = pct + '%';
      }
    }
  }
}

// ══════════════════════════════════════════
// AGENT TIMERS
// ══════════════════════════════════════════
function startAgentTimer(taskId, role){
  const key = taskId + ':' + role;
  if(agentTimers.has(key)) return;
  const task = tasks.get(taskId);
  const agent = task?.agents.get(role);
  if(!agent) return;

  const timerId = setInterval(() => {
    const el = document.getElementById(`timer-${taskId}-${slugify(role)}`);
    if(!el) return;
    const elapsed = (Date.now() - agent.startTime) / 1000;
    el.textContent = elapsed.toFixed(1) + 's';
  }, 100);
  agentTimers.set(key, timerId);
}

function stopAgentTimer(taskId, role){
  const key = taskId + ':' + role;
  const id = agentTimers.get(key);
  if(id){ clearInterval(id); agentTimers.delete(key); }
}

// ══════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════
$chatInput.addEventListener('input', () => {
  $btnSend.disabled = !$chatInput.value.trim() && !pendingFile;
  autoResizeTextarea();
});
$chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){e.preventDefault(); sendMessage();}
});
$btnSend.addEventListener('click', sendMessage);

function autoResizeTextarea(){
  $chatInput.style.height = 'auto';
  $chatInput.style.height = Math.min($chatInput.scrollHeight, 120) + 'px';
}

// File upload
$fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  pendingFile = file;
  $fileInfo.textContent = `📎 ${file.name} (${(file.size/1024).toFixed(1)}KB)`;
  $fileInfo.classList.remove('hidden');
  $btnSend.disabled = false;
});

async function sendMessage(){
  const text = $chatInput.value.trim();
  if(!text && !pendingFile) return;

  // Upload file first if present
  if(pendingFile){
    try{
      const fd = new FormData();
      fd.append('file', pendingFile);
      await fetch(API_BASE + '/run/media', {method:'POST', body:fd});
    }catch(e){
      console.error('File upload failed:', e);
    }
    pendingFile = null;
    $fileInfo.classList.add('hidden');
    $fileInfo.textContent = '';
    $fileInput.value = '';
  }

  if(!text) return;

  // Add user message to chat
  addChatMessage('user', text);
  chatHistory.push({role:'user', content:text});
  $chatInput.value = '';
  $chatInput.style.height = 'auto';
  $btnSend.disabled = true;
  hideChatEmpty();

  // Send to API
  try{
    const r = await fetch(API_BASE + '/run', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt: text})
    });
    const data = await r.json();

    // Add system response
    const output = data.output || data.message || JSON.stringify(data);
    addChatMessage('system', output, data);
    chatHistory.push({role:'system', content:output, meta:data});

    // Update session stats from response
    if(data.cost_usd){
      sessionCost += data.cost_usd;
      $sessionCost.textContent = sessionCost.toFixed(4);
    }
    if(data.tokens?.total){
      sessionTokens += data.tokens.total;
      $sessionTokens.textContent = sessionTokens.toLocaleString();
    }

    // If we got specialist_results and no WS events, build trace from response
    if(data.task_id){
      buildTraceFromResponse(data);
    }

    if(soundEnabled) playBeep();
  } catch(e){
    addChatMessage('system', `**Error:** ${e.message}`);
  }
}

function buildTraceFromResponse(data){
  const taskId = data.task_id;
  if(!taskId) return;
  // Only build if task doesn't already exist from WS events
  if(tasks.has(taskId) && tasks.get(taskId).agents.size > 0) return;

  const task = getOrCreateTask(taskId);
  const title = task.el.querySelector('.task-title');
  if(chatHistory.length > 0){
    const lastUser = [...chatHistory].reverse().find(m=>m.role==='user');
    if(lastUser) title.textContent = truncate(lastUser.content, 80);
  }

  // Route
  if(data.route){
    const node = createNode('🔀', 'ROUTER', `→ ${data.route.tier||''} / ${data.route.model||''}`, 'done');
    task.tree.appendChild(node);
  }

  // Plan
  if(data.specialist_results && data.specialist_results.length > 0){
    const section = document.createElement('div');
    section.className = 'plan-section';
    section.innerHTML = `
      <div class="plan-label">
        <span class="plan-icon">🧠</span>
        <span style="color:var(--text)">PLANNER</span>
        <span class="plan-time">${data.plan_time ? data.plan_time.toFixed(1)+'s' : ''}</span>
      </div>
      <div class="plan-agents"></div>
    `;
    const agentList = section.querySelector('.plan-agents');
    data.specialist_results.forEach(sr => {
      const agDiv = document.createElement('div');
      agDiv.className = 'plan-agent';
      let tags = '';
      if(sr.provider?.includes('tool')) tags += ` <span class="node-tag tool">${sr.provider}</span>`;
      if(sr.uncensored) tags += ' <span class="node-tag uncensored">uncensored</span>';
      agDiv.innerHTML = `${sr.role}${tags}`;
      agentList.appendChild(agDiv);
    });
    task.tree.appendChild(section);

    // Agent nodes (already complete)
    data.specialist_results.forEach(sr => {
      const wrapper = document.createElement('div');
      wrapper.className = 'tree-section';
      const node = document.createElement('div');
      node.className = 'tree-node done';

      let tags = '';
      if(sr.provider?.includes('tool')) tags += `<span class="node-tag tool">${sr.provider}</span>`;
      if(sr.uncensored) tags += '<span class="node-tag uncensored">uncensored</span>';

      const statusIcon = sr.status === 'ok' ? '✅' : '❌';
      node.innerHTML = `
        <div class="node-header">
          <span class="node-icon">${statusIcon}</span>
          <span class="node-label">${esc(sr.role)}</span>
          <div class="node-tags">${tags}</div>
          <span class="node-timer done">${(sr.latency||0).toFixed(1)}s ✓</span>
        </div>
        <div class="progress-bar"><div class="progress-fill done" style="width:100%"></div></div>
      `;

      const subs = document.createElement('div');
      subs.className = 'sub-results';
      if(sr.model){
        const s = document.createElement('div');
        s.className = 'sub-result';
        s.innerHTML = `<span class="sr-icon sr-info">ℹ️</span>${esc(sr.model)} · ${sr.tokens_in||0}→${sr.tokens_out||0} tok`;
        subs.appendChild(s);
      }

      wrapper.appendChild(node);
      wrapper.appendChild(subs);
      task.tree.appendChild(wrapper);
      task.agents.set(sr.role, {status:'done', el:wrapper});
    });
  }

  // Complete footer
  const footer = document.createElement('div');
  footer.className = 'task-complete';
  footer.innerHTML = `
    ✅ <strong>COMPLETE</strong>
    <span class="tc-stat">time</span><span class="tc-val">${(data.latency_s||0).toFixed(1)}s</span>
    <span class="tc-stat">tokens</span><span class="tc-val">${(data.tokens?.total||0).toLocaleString()}</span>
    <span class="tc-stat">cost</span><span class="tc-val">$${(data.cost_usd||0).toFixed(4)}</span>
    <span class="tc-stat">agents</span><span class="tc-val">${data.agents||data.specialist_results?.length||0}</span>
  `;
  task.tree.appendChild(footer);
  const icon = task.el.querySelector('.task-icon');
  if(icon) icon.textContent = '✅';

  if(autoScroll) scrollTrace();
}

function addChatMessage(role, content, meta){
  hideChatEmpty();
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if(role === 'system'){
    let html = '<div class="md-content">' + marked.parse(content) + '</div>';
    if(meta){
      html += '<div class="msg-meta">';
      if(meta.route?.tier) html += `<span class="meta-pill">${meta.route.tier}</span>`;
      if(meta.route?.model) html += `<span class="meta-pill purple">${meta.route.model}</span>`;
      if(meta.tokens?.total) html += `<span class="meta-pill green">${meta.tokens.total.toLocaleString()} tok</span>`;
      if(meta.cost_usd != null) html += `<span class="meta-pill amber">$${meta.cost_usd.toFixed(4)}</span>`;
      if(meta.latency_s != null) html += `<span class="meta-pill">${meta.latency_s.toFixed(1)}s</span>`;
      html += '</div>';
    }
    div.innerHTML = html;
  } else {
    div.textContent = content;
  }

  $chatMessages.appendChild(div);
  $chatMessages.scrollTop = $chatMessages.scrollHeight;
}

// ══════════════════════════════════════════
// BUTTONS
// ══════════════════════════════════════════

// Sound toggle
document.getElementById('btn-sound').addEventListener('click', function(){
  soundEnabled = !soundEnabled;
  this.classList.toggle('active', soundEnabled);
});

// Export
document.getElementById('btn-export').addEventListener('click', () => {
  let md = '# NCore Session Export\n\n';
  md += `Session Cost: $${sessionCost.toFixed(4)} | Tokens: ${sessionTokens.toLocaleString()}\n\n`;
  md += '---\n\n## Chat\n\n';
  chatHistory.forEach(m => {
    if(m.role === 'user') md += `**User:** ${m.content}\n\n`;
    else md += `**System:**\n${m.content}\n\n`;
    if(m.meta){
      md += `> Tier: ${m.meta.route?.tier||'-'} | Model: ${m.meta.route?.model||'-'} | Tokens: ${m.meta.tokens?.total||0} | Cost: $${(m.meta.cost_usd||0).toFixed(4)} | Time: ${(m.meta.latency_s||0).toFixed(1)}s\n\n`;
    }
  });
  md += '---\n\n## Execution Trace\n\n';
  traceHistory.forEach(e => {
    md += `- [${e.type}] ${JSON.stringify(e.data)}\n`;
  });

  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ncore-export-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// Auto-scroll toggle
document.getElementById('btn-autoscroll').addEventListener('click', function(){
  autoScroll = !autoScroll;
  this.classList.toggle('active', autoScroll);
});

// Clear trace
document.getElementById('btn-clear-trace').addEventListener('click', () => {
  tasks.clear();
  agentTimers.forEach(id => clearInterval(id));
  agentTimers.clear();
  $traceContainer.innerHTML = '';
  $traceContainer.appendChild($traceEmpty);
  $traceEmpty.classList.remove('hidden');
});

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function scrollTrace(){
  requestAnimationFrame(() => {
    $traceScroll.scrollTop = $traceScroll.scrollHeight;
  });
}
function hideChatEmpty(){ $chatEmpty.classList.add('hidden'); }
function hideTraceEmpty(){ $traceEmpty.classList.add('hidden'); }
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function truncate(s,n){ return s.length > n ? s.slice(0,n)+'…' : s; }
function slugify(s){ return s.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase(); }
function generateId(){ return Math.random().toString(36).slice(2,10); }

function playBeep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e){}
}

// ── Auto-scroll detection: pause when user scrolls up ──
$traceScroll.addEventListener('scroll', () => {
  const atBottom = $traceScroll.scrollHeight - $traceScroll.scrollTop - $traceScroll.clientHeight < 80;
  if(!atBottom && autoScroll){
    // User scrolled up — don't auto-disable, just let them look
  }
});

// Expose for testing & external triggers
window.handleWSEvent = handleWSEvent;
window.addChatMessage = addChatMessage;
window.getTasksMap = () => tasks;

})();
