<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Mother's Day, Mami!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(135deg, #ffe4e1 0%, #ffc0cb 50%, #ffb6c1 100%);
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }
  .hearts {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .heart {
    position: absolute;
    color: rgba(255, 105, 180, 0.3);
    font-size: 24px;
    animation: float 6s ease-in infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }
  .content {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 40px 30px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(255, 105, 180, 0.2);
  }
  h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: #c2185b;
    margin-bottom: 16px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }
  .subtitle {
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    color: #ad1457;
    margin-bottom: 24px;
    font-style: italic;
  }
  .message {
    font-size: clamp(0.9rem, 3vw, 1.15rem);
    color: #880e4f;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .signature {
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: #c2185b;
    font-weight: bold;
  }
  .flower {
    font-size: clamp(2rem, 6vw, 3rem);
    margin-bottom: 16px;
  }
  .date {
    font-size: 0.85rem;
    color: #ad1457;
    margin-top: 16px;
    opacity: 0.7;
  }
  @media (max-height: 600px) {
    .content { padding: 24px 20px; }
    .message { margin-bottom: 16px; }
  }
</style>
</head>
<body>
<div class="hearts" id="hearts"></div>
<div class="card">
  <div class="content">
    <div class="flower">🌸💐🌷</div>
    <h1>Happy Mother's Day, Mami!</h1>
    <div class="subtitle">Te quiero mucho</div>
    <div class="message">
      Gracias por tu amor infinito,<br>
      por tu paciencia y tu fuerza.<br>
      Eres la luz que ilumina cada día.<br>
      Hoy celebramos todo lo que eres.
    </div>
    <div class="signature">Con todo mi cariño ❤️</div>
    <div class="date">May 10, 2026</div>
  </div>
</div>
<script>
  const heartsContainer = document.getElementById('hearts');
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = ['❤️','💖','💗','💓','💕'][Math.floor(Math.random()*5)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (Math.random() * 20 + 16) + 'px';
    heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
    heart.style.animationDelay = (Math.random() * 6) + 's';
    heartsContainer.appendChild(heart);
  }
</script>
</body>
</html>
